<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Madiha Modi | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .ui-overlay {
      position: absolute;
      bottom: 25px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 20;
      pointer-events: none;
    }

    .instruction {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      display: inline-block;
      padding: 10px 24px;
      border-radius: 50px;
      color: #ffefc0;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255, 200, 100, 0.7);
      pointer-events: none;
      font-family: monospace;
    }

    .title-card {
      position: absolute;
      top: 4%;
      left: 4%;
      z-index: 20;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(20px);
      padding: 0.8rem 2rem;
      border-radius: 50px;
      border-left: 5px solid #ffcc66;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      pointer-events: none;
      animation: fadeSlide 0.7s ease-out;
    }

    .title-card h1 {
      margin: 0;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #ffffff, #ffdd99, #ffaa66);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
      font-family: 'Playfair Display', serif;
    }

    .title-card p {
      margin: 0.2rem 0 0;
      color: #e8dcc8;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateX(-35px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .scroll-progress {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      padding: 15px 10px;
      border-radius: 40px;
      pointer-events: auto;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 200, 0.4);
      transition: all 0.3s ease;
      cursor: pointer;
      pointer-events: auto;
    }

    .progress-dot.active {
      background: #ffcc66;
      box-shadow: 0 0 15px #ffaa44;
      transform: scale(1.5);
    }

    .progress-dot:hover {
      background: #ffdd99;
      transform: scale(1.3);
    }

  
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(25px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .hidden {
      display: none !important;
    }

    .popup-card {
      background: linear-gradient(145deg, #1e2a3a, #0f1722);
      border-radius: 48px;
      max-width: 580px;
      width: 90%;
      padding: 40px 36px;
      text-align: center;
      border: 1px solid rgba(255, 200, 100, 0.5);
      box-shadow: 0 35px 65px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 200, 100, 0.2) inset;
      animation: popIn 0.3s ease-out;
      max-height: 85vh;
      overflow-y: auto;
    }

    .popup-card::-webkit-scrollbar {
      width: 6px;
    }
    .popup-card::-webkit-scrollbar-track {
      background: #2a3a4a;
      border-radius: 10px;
    }
    .popup-card::-webkit-scrollbar-thumb {
      background: #ffcc88;
      border-radius: 10px;
    }

    .popup-card h2 {
      font-size: 2.2rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #ffdd99, #ffaa66);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
      font-family: 'Playfair Display', serif;
    }

    /*About section */
    .about-text {
      font-size: 1rem;
      line-height: 1.75;
      color: #e8e0d0;
      text-align: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      border: 1px solid rgba(255, 200, 100, 0.2);
    }
    .about-text i {
      font-size: 2.2rem;
      color: #ffcc88;
      margin-bottom: 15px;
      display: block;
    }

    /*Skills */
    .skills-badge {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin: 20px 0;
    }
    .skill-tag {
      background: linear-gradient(135deg, rgba(255, 200, 100, 0.25), rgba(255, 150, 50, 0.15));
      padding: 10px 24px;
      border-radius: 50px;
      border: 1px solid #ffcc88;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff5e8;
      transition: all 0.2s;
    }
    .skill-tag:hover {
      transform: translateY(-2px);
      background: rgba(255, 200, 100, 0.35);
    }
    .skill-tag i {
      margin-right: 8px;
      color: #ffcc88;
    }

    /* Project */
    .projects-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 15px;
    }
    .project-card {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 28px;
      padding: 20px 24px;
      text-align: left;
      border: 1px solid rgba(255, 200, 100, 0.35);
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }
    .project-card:hover {
      transform: translateX(8px);
      border-color: #ffcc88;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .project-icon {
      font-size: 2rem;
      color: #ffcc88;
      margin-bottom: 12px;
    }
    .project-card strong {
      color: #ffdd99;
      font-size: 1.2rem;
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .project-card p {
      color: #d0c8b8;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .project-link {
      color: #ffaa66;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .project-link:hover {
      color: #ffdd99;
      gap: 12px;
    }

    /*Contact items */
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 10px 0;
    }
    .contact-row {
      margin: 0;
      text-align: left;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 24px;
      transition: 0.2s;
      border: 1px solid rgba(255, 200, 100, 0.15);
    }
    .contact-row:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 200, 100, 0.4);
    }
    .contact-row strong {
      color: #ffdd99;
      font-size: 1rem;
      display: inline-block;
      width: 100px;
      font-weight: 700;
    }
    .contact-row a {
      color: #ffcc88;
      text-decoration: none;
      font-weight: 500;
    }
    .contact-row a:hover {
      text-decoration: underline;
    }

    /* Improved Close Button */
    .close-btn {
      background: linear-gradient(135deg, rgba(255, 200, 100, 0.2), rgba(255, 150, 50, 0.1));
      border: 1px solid rgba(255, 200, 100, 0.6);
      padding: 12px 36px;
      border-radius: 50px;
      color: #ffdd99;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.25s;
      margin-top: 28px;
      width: 100%;
    }
    .close-btn:hover {
      background: rgba(255, 200, 100, 0.3);
      color: white;
      transform: scale(1.02);
      border-color: #ffdd99;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 700px) {
      .title-card h1 { font-size: 1.5rem; }
      .popup-card { padding: 28px 22px; }
      .popup-card h2 { font-size: 1.7rem; }
      .contact-row strong { width: 80px; }
      .skill-tag { padding: 7px 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="title-card">
  <h1>Madiha Modi</h1>
  <p>✦ Entry-Level Software Developer • Web Enthusiast ✦</p>
</div>

<div class="scroll-progress">
  <div class="progress-dot active" data-index="0"></div>
  <div class="progress-dot" data-index="1"></div>
  <div class="progress-dot" data-index="2"></div>
  <div class="progress-dot" data-index="3"></div>
</div>

<div class="ui-overlay">
  <div class="instruction">✨ SCROLL → navigate crystals • CLICK any crystal for details ✨</div>
</div>

<div id="popup" class="popup hidden">
  <div class="popup-card">
    <h2 id="popTitle"></h2>
    <div id="popContent"></div>
    <button class="close-btn" id="closePopupBtn"><i class="fas fa-times"></i> Close</button>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';

  // --- setup scene ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x071a2e);
  scene.fog = new THREE.FogExp2(0x071a2e, 0.0035);

  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 4.2, 8);
  
  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setPixelRatio(window.devicePixelRatio);
  
  // --- Lighting ---
  const ambientLight = new THREE.AmbientLight(0x50507a, 0.65);
  scene.add(ambientLight);
  const sunLight = new THREE.DirectionalLight(0xfff5df, 1.4);
  sunLight.position.set(12, 22, 6);
  sunLight.castShadow = true;
  scene.add(sunLight);
  const fillLight = new THREE.PointLight(0x88aaff, 0.6);
  fillLight.position.set(-4, 5, 6);
  scene.add(fillLight);
  const warmFill = new THREE.PointLight(0xffaa77, 0.65);
  warmFill.position.set(5, 4, -5);
  scene.add(warmFill);
  const movingLight = new THREE.PointLight(0xff77bb, 0.7);
  scene.add(movingLight);
  
  // --- Terrain ---
  const widthTerrain = 140;
  const depthTerrain = 200;
  const segments = 140;
  const terrainGeo = new THREE.PlaneGeometry(widthTerrain, depthTerrain, segments, segments);
  terrainGeo.rotateX(-Math.PI / 2);
  
  const positionsAttr = terrainGeo.attributes.position.array;
  for (let i = 0; i <= segments; i++) {
    for (let j = 0; j <= segments; j++) {
      const idx = (i * (segments + 1) + j) * 3;
      const x = positionsAttr[idx];
      const z = positionsAttr[idx+2];
      let y = 0;
      y += Math.sin(x * 0.12) * 0.5 * Math.cos(z * 0.12);
      y += Math.sin(x * 0.35) * 0.3;
      y += Math.cos(z * 0.35) * 0.3;
      y += Math.sin((x * 0.7 + z * 0.55)) * 0.25;
      y += Math.max(0, Math.sin(z * 0.18) * 0.25);
      positionsAttr[idx+1] = y;
    }
  }
  terrainGeo.computeVertexNormals();
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a8a4a, roughness: 0.68 });
  const terrainMesh = new THREE.Mesh(terrainGeo, groundMat);
  terrainMesh.receiveShadow = true;
  terrainMesh.castShadow = true;
  scene.add(terrainMesh);
  
  // Pond
  const pondGeo = new THREE.CircleGeometry(4.5, 28);
  const pondMat = new THREE.MeshStandardMaterial({ color: 0x4aaeff, metalness: 0.8, roughness: 0.25, emissive: 0x3388cc, emissiveIntensity: 0.2, transparent: true, opacity: 0.75 });
  const pond = new THREE.Mesh(pondGeo, pondMat);
  pond.rotation.x = -Math.PI / 2;
  pond.position.y = -0.08;
  scene.add(pond);
  
  function getHeight(x, z) {
    let y = Math.sin(x * 0.12) * 0.5 * Math.cos(z * 0.12);
    y += Math.sin(x * 0.35) * 0.3;
    y += Math.cos(z * 0.35) * 0.3;
    y += Math.sin((x * 0.7 + z * 0.55)) * 0.25;
    y += Math.max(0, Math.sin(z * 0.18) * 0.25);
    return y;
  }
  
  // Trees
  function addTree(x, z) {
    const group = new THREE.Group();
    const yPos = getHeight(x, z);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0xaa784a });
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.45, 0.9, 6), trunkMat);
    trunk.position.y = 0.45;
    trunk.castShadow = true;
    group.add(trunk);
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x6ca34a, emissive: 0x2a5a2a, emissiveIntensity: 0.05 });
    const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.62, 1.0, 7), leafMat);
    foliage1.position.y = 0.98;
    foliage1.castShadow = true;
    const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.48, 0.85, 7), leafMat);
    foliage2.position.y = 1.6;
    foliage2.castShadow = true;
    group.add(foliage1, foliage2);
    group.position.set(x, yPos - 0.08, z);
    scene.add(group);
  }
  
  for (let i = 0; i < 280; i++) {
    const angle = Math.random() * Math.PI * 2;
    const radius = 12 + Math.random() * 65;
    let x = Math.cos(angle) * radius;
    let z = Math.sin(angle) * radius;
    if (Math.abs(x) < 7 && Math.abs(z) < 7) continue;
    addTree(x, z);
  }
  
  // --- CRYSTALS ---
  const crystalPositions = [
    { x: -4.5, z: -5, color: 0xaa66ff, emissive: 0x8844dd, title: "📖 ABOUT ME", section: "about" },
    { x: 4.2, z: -3, color: 0xff66aa, emissive: 0xdd44aa, title: "⚙️ SKILLS", section: "skills" },
    { x: -3.8, z: 3, color: 0xffaa33, emissive: 0xdd8822, title: "🚀 PROJECTS", section: "projects" },
    { x: 4.5, z: 5.5, color: 0x33ddff, emissive: 0x22aacc, title: "📬 CONTACT", section: "contact" }
  ];
  
 
  const sectionDataMap = {
    about: {
      kind: "about",
      text: "Entry-level Software and Web Developer with foundational knowledge of programming and web technologies including HTML, CSS, JavaScript, Python and MySQL. Seeking a Junior Developer or Software Engineer Intern role to gain hands-on experience. Passionate about building clean, responsive web applications and eager to contribute to real-world projects while growing professionally."
    },
    skills: {
      kind: "skills",
      list: ["HTML", "CSS", "JavaScript", "Python", "Flask", "MySQL", "Git"]
    },
    projects: {
      kind: "projects",
      items: [
        { name: "🐾 Paw Heaven", desc: "Pet adoption platform", link: "https://github.com/madihamodi24/Paw-Heaven", icon: "fas fa-paw" },
        { name: "📱 Attendify", desc: "QR Attendance System for institutions & analytics", link: "https://github.com/madihamodi24/Attendify", icon: "fas fa-qrcode" },
        { name: "💪 HerCycle", desc: "Health tracker & cycle insights for women", link: "https://github.com/madihamodi24/HerCycle", icon: "fas fa-female" },
        { name: "✈️ Global Travel", desc: "Modern travel portal with booking UI", link: "https://globaltravelservices.in/", icon: "fas fa-globe" }
      ]
    },
    contact: {
      kind: "contact",
      contacts: [
        { label: "💻 GitHub", value: "github.com/madihamodi24", url: "https://github.com/madihamodi24", icon: "fab fa-github" },
        { label: "🔗 LinkedIn", value: "linkedin.com/in/madihamodi", url: "https://linkedin.com/in/madihamodi", icon: "fab fa-linkedin" },
        { label: "📧 Email", value: "modimadiha24@gmail.com", url: "modimadiha24@gmail.com", icon: "fas fa-envelope" },
        { label: "📄 Resume", value: "Download PDF", isResume: true, icon: "fas fa-file-pdf" }
      ]
    }
  };
  
  const interactiveCrystals = [];
  
  function createCrystal(x, z, color, emissiveColor, title, sectionKey) {
    const group = new THREE.Group();
    const crystalMat = new THREE.MeshStandardMaterial({ color: color, emissive: emissiveColor, emissiveIntensity: 0.7, metalness: 0.9, roughness: 0.15 });
    const crystalGeo = new THREE.OctahedronGeometry(0.92);
    const crystalMesh = new THREE.Mesh(crystalGeo, crystalMat);
    crystalMesh.castShadow = true;
    group.add(crystalMesh);
    
    const ringGeo = new THREE.TorusGeometry(0.82, 0.08, 24, 52);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0xff8844, emissiveIntensity: 0.5 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = -0.78;
    group.add(ring);
    
    // Label canvas
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 130;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#ffdd99';
    ctx.lineWidth = 3;
    ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
    ctx.font = 'Bold 36px "Playfair Display"';
    ctx.fillStyle = '#fff5e6';
    ctx.textAlign = 'center';
    ctx.fillText(title, canvas.width/2, 65);
    ctx.font = '16px "Inter"';
    ctx.fillStyle = '#ffcc88';
    ctx.fillText('▼ click me ▼', canvas.width/2, 105);
    const texture = new THREE.CanvasTexture(canvas);
    const labelMat = new THREE.MeshStandardMaterial({ map: texture, side: THREE.DoubleSide, transparent: true });
    const labelPlane = new THREE.Mesh(new THREE.PlaneGeometry(2.7, 0.78), labelMat);
    labelPlane.position.y = 1.55;
    group.add(labelPlane);
    
    const baseY = getHeight(x, z);
    group.position.set(x, baseY + 0.25, z);
    scene.add(group);
    
    group.userData = { type: "sectionCrystal", title: title, sectionData: sectionDataMap[sectionKey] };
    return group;
  }
  
  crystalPositions.forEach(pos => {
    interactiveCrystals.push(createCrystal(pos.x, pos.z, pos.color, pos.emissive, pos.title, pos.section));
  });
  
  // Particles
  const particleCount = 2200;
  const particleGeoPoints = new THREE.BufferGeometry();
  const particlePositionsArray = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    particlePositionsArray[i*3] = (Math.random() - 0.5) * 150;
    particlePositionsArray[i*3+1] = Math.random() * 8;
    particlePositionsArray[i*3+2] = (Math.random() - 0.5) * 120 - 20;
  }
  particleGeoPoints.setAttribute('position', new THREE.BufferAttribute(particlePositionsArray, 3));
  const particleMatGlow = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.05, transparent: true, opacity: 0.6 });
  const fireflyPoints = new THREE.Points(particleGeoPoints, particleMatGlow);
  scene.add(fireflyPoints);
  
  // Clouds
  const cloudMaterial = new THREE.MeshStandardMaterial({ color: 0xeef4ff, emissive: 0xaaccff, emissiveIntensity: 0.06, transparent: true, opacity: 0.5 });
  for (let i = 0; i < 30; i++) {
    const cloudPart = new THREE.Mesh(new THREE.SphereGeometry(0.5 + Math.random()*0.5, 6), cloudMaterial);
    cloudPart.position.set((Math.random() - 0.5) * 55, 7 + Math.random() * 7, (Math.random() - 0.5) * 70 - 25);
    scene.add(cloudPart);
  }
  

  const sectionCount = interactiveCrystals.length;
  let currentSection = 0;
  let targetSection = 0;
  let scrollAccumulator = 0;
  
  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    scrollAccumulator += e.deltaY * 0.35;
    if (Math.abs(scrollAccumulator) > 65) {
      if (scrollAccumulator > 0 && targetSection < sectionCount - 1) targetSection++;
      else if (scrollAccumulator < 0 && targetSection > 0) targetSection--;
      scrollAccumulator = 0;
      updateActiveDot(targetSection);
    }
  }, { passive: false });
  
  document.querySelectorAll('.progress-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      targetSection = parseInt(dot.dataset.index);
      scrollAccumulator = 0;
      updateActiveDot(targetSection);
    });
  });
  
  function updateActiveDot(section) {
    document.querySelectorAll('.progress-dot').forEach((dot, i) => {
      if (i === section) dot.classList.add('active');
      else dot.classList.remove('active');
    });
  }
  
  
  const raycaster = new THREE.Raycaster();
  const mouseVec = new THREE.Vector2();
  
  function showPopup(sectionData, title) {
    const popupDiv = document.getElementById('popup');
    const titleEl = document.getElementById('popTitle');
    const contentDiv = document.getElementById('popContent');
    titleEl.innerHTML = title;
    
    if (sectionData.kind === 'about') {
      contentDiv.innerHTML = `<div class="about-text"><i class="fas fa-user-graduate"></i>${sectionData.text}</div>`;
    } 
    else if (sectionData.kind === 'skills') {
      let html = '<div class="skills-badge">';
      sectionData.list.forEach(s => { html += `<span class="skill-tag"><i class="fas fa-code"></i> ${s}</span>`; });
      html += '</div>';
      contentDiv.innerHTML = html;
    }
    else if (sectionData.kind === 'projects') {
      let html = '<div class="projects-grid">';
      sectionData.items.forEach(p => {
        html += `<div class="project-card">
                  <div class="project-icon"><i class="${p.icon}"></i></div>
                  <strong>${p.name}</strong>
                  <p>${p.desc}</p>
                  <a href="${p.link}" class="project-link" target="_blank"><i class="fas fa-external-link-alt"></i> View Project →</a>
                </div>`;
      });
      html += '</div>';
      contentDiv.innerHTML = html;
    }
    else if (sectionData.kind === 'contact') {
      let html = '<div class="contact-list">';
      sectionData.contacts.forEach(c => {
        if (c.isResume) {
          html += `<div class="contact-row"><strong><i class="fas fa-file-pdf"></i> ${c.label}</strong>
                    <button id="resumeBtn" style="background:linear-gradient(135deg,#ffaa44,#ff7700); border:none; padding:6px 18px; border-radius:30px; margin-left:15px; cursor:pointer; font-weight:bold; color:#1e1e2a;"><i class="fas fa-download"></i> Download</button></div>`;
        } else {
          html += `<div class="contact-row"><strong><i class="${c.icon}"></i> ${c.label}</strong><a href="${c.url}" target="_blank">${c.value}</a></div>`;
        }
      });
      html += '</div>';
      contentDiv.innerHTML = html;
      
      setTimeout(() => {
  const btn = document.getElementById('resumeBtn');
  if (btn) {
    btn.onclick = () => {
    
      const a = document.createElement('a');
      a.href = "Madiha Modi CV.pdf";  
      a.download = "Madiha Modi CV.pdf";  
      a.click();
    };
  }
}, 50);
    }
    popupDiv.classList.remove('hidden');
  }
  
  function onClickCanvas(event) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouseVec.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouseVec.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseVec, camera);
    const intersects = raycaster.intersectObjects(interactiveCrystals, true);
    if (intersects.length > 0) {
      let hit = intersects[0].object;
      while (hit && (!hit.userData || hit.userData.type !== "sectionCrystal") && hit.parent) hit = hit.parent;
      if (hit && hit.userData) showPopup(hit.userData.sectionData, hit.userData.title);
    }
  }
  
  document.addEventListener('click', onClickCanvas);
  
  const closeBtn = document.getElementById('closePopupBtn');
  if (closeBtn) {
    // Remove any existing listeners and add fresh one
    const newCloseBtn = closeBtn.cloneNode(true);
    closeBtn.parentNode.replaceChild(newCloseBtn, closeBtn);
    newCloseBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('popup').classList.add('hidden');
    });
  }
  
 
  const popupElement = document.getElementById('popup');
  popupElement.addEventListener('click', (e) => {
    if (e.target === popupElement) {
      popupElement.classList.add('hidden');
    }
  });
  
  // --- ANIMATION ---
  let timeAnim = 0;
  let mouseX = 0, mouseY = 0;
  
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = (e.clientY / window.innerHeight) * 2 - 1;
  });
  
  function animateScene() {
    requestAnimationFrame(animateScene);
    timeAnim += 0.012;
    
    currentSection += (targetSection - currentSection) * 0.09;
    const idx1 = Math.floor(currentSection);
    const idx2 = Math.min(idx1 + 1, sectionCount - 1);
    const t = currentSection - idx1;
    const c1 = crystalPositions[idx1], c2 = crystalPositions[idx2];
    const targetX = c1 ? (c1.x + (c2?.x - c1.x) * t) : 0;
    const targetZ = c1 ? (c1.z + (c2?.z - c1.z) * t) : 0;
    
    camera.position.x += ((targetX + mouseX * 1.2) - camera.position.x) * 0.08;
    camera.position.y += ((3.8 + mouseY * 0.6) - camera.position.y) * 0.08;
    camera.position.z += ((targetZ - 6.5) - camera.position.z) * 0.09;
    camera.lookAt(targetX + mouseX * 0.5, 2.5, targetZ);
    
    interactiveCrystals.forEach((crystal, idx) => {
      if (crystal.children[0]) crystal.children[0].rotation.y = timeAnim * 0.7;
      if (!crystal.userData.origY) crystal.userData.origY = crystal.position.y;
      crystal.position.y = crystal.userData.origY + Math.sin(timeAnim * 1.3 + idx) * 0.08;
      const label = crystal.children.find(c => c.material && c.material.map);
      if (label) label.lookAt(camera.position);
    });
    
    movingLight.position.x = Math.sin(timeAnim) * 5;
    movingLight.position.z = Math.cos(timeAnim * 0.9) * 6;
    fireflyPoints.rotation.y += 0.0008;
    pondMat.emissiveIntensity = 0.25 + Math.sin(timeAnim * 1.5) * 0.08;
    
    renderer.render(scene, camera);
  }
  
  animateScene();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  
</script>
</body>
</html>
